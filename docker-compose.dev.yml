# Optional: only Postgres for local `npm run dev`
# Usage: docker compose -f docker-compose.dev.yml up -d
services:
  db:
    image: postgres:17
    container_name: nobatet-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nobatet
    ports:
      - "5432:5432"
    volumes:
      - nobatet_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nobatet"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  nobatet_pgdata_dev:
