<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d9488" />
    <title>آفلاین | نوبتت</title>
    <style>
      body {
        font-family: Tahoma, Vazirmatn, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 28px 22px;
        max-width: 360px;
        box-shadow: 0 8px 30px rgba(15, 23, 42, 0.06);
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 8px;
      }
      p {
        color: #64748b;
        font-size: 0.9rem;
        line-height: 1.7;
        margin: 0 0 18px;
      }
      button {
        background: #0d9488;
        color: #fff;
        border: 0;
        border-radius: 12px;
        height: 44px;
        padding: 0 18px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div style="font-size: 2rem; margin-bottom: 8px">📡</div>
      <h1>اتصال اینترنت قطع است</h1>
      <p>
        نوبتت به‌صورت آفلاین محدود کار می‌کند. پس از وصل شدن دوباره تلاش کنید.
        نوبت‌های امروز در صورت کش‌شدن قبلی ممکن است در دسترس باشند.
      </p>
      <button onclick="location.reload()">تلاش مجدد</button>
    </div>
  </body>
</html>
