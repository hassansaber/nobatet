<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0284C7" />
    <title>آفلاین | نوبتت</title>
    <style>
      *{box-sizing:border-box}
      body {
        font-family: Vazirmatn, Tahoma, sans-serif;
        background: #F0F9FF;
        color: #0F172A;
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.5);
        border-radius: 20px;
        padding: 28px 22px;
        max-width: 360px;
        width: 100%;
        box-shadow: 0 8px 32px rgba(2,132,199,0.12);
      }
      h1 { font-size: 1.1rem; margin: 0 0 8px; font-weight: 600; }
      p { color: #475569; font-size: 0.85rem; line-height: 1.8; margin: 0 0 18px; }
      .btn {
        background: #0284C7;
        color: #fff;
        border: 0;
        border-radius: 12px;
        height: 40px;
        padding: 0 18px;
        font-weight: 500;
        cursor: pointer;
        width: 100%;
        font-size: 0.85rem;
      }
      .btn-secondary {
        background: white;
        color: #0F172A;
        border: 1px solid #E0F0F8;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div style="width:48px;height:48px;background:#0284C71A;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:#0284C7">!</div>
      <h1>اتصال برقرار نیست</h1>
      <p>
        به نظر می‌رسد اینترنت شما قطع است. نوبتت به صورت محدود آفلاین کار می‌کند.<br/>
        اگر این صفحه بعد از ورود نمایش داده می‌شود، لطفا کوکی‌ها را پاک و دوباره وارد شوید.
      </p>
      <button class="btn" onclick="location.reload()">تلاش مجدد</button>
      <button class="btn btn-secondary" onclick="location.href='/'">بازگشت به خانه</button>
    </div>
  </body>
</html>
