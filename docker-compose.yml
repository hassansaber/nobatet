services:
  db:
    image: postgres:17
    container_name: nobatet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nobatet
    ports:
      - "5432:5432"
    volumes:
      - nobatet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nobatet"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nobatet-app:latest
    container_name: nobatet-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      # override host-local values so containers talk to each other
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nobatet
      NODE_ENV: production
      NEXT_PUBLIC_BASE_DOMAIN: localhost:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      RUN_SEED: "true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  nobatet_pgdata:
